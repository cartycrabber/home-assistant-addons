name: Update PostgreSQL 18

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Check for PostgreSQL 18 updates
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get latest PostgreSQL 18.x tag from Docker Hub
        id: latest
        run: |
          LATEST=$(curl -sSf "https://hub.docker.com/v2/repositories/library/postgres/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^18\.[0-9]+$' \
            | sort -V \
            | tail -1)
          if [ -z "$LATEST" ]; then
            echo "ERROR: Failed to fetch latest PostgreSQL 18 version" >&2
            exit 1
          fi
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Get current version
        id: current
        run: |
          CURRENT=$(grep '^version:' postgresql18/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"

      - name: Determine if update is needed
        id: check
        # Safe: expression comparison in if: context, not shell expansion
        run: |
          if [ "${{ steps.latest.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in config.yaml and Dockerfile
        if: steps.check.outputs.needed == 'true'
        # Pass outputs via env to avoid expression injection in shell run: bodies
        env:
          NEW: ${{ steps.latest.outputs.version }}
        run: |
          sed -i "s/^version: .*/version: \"${NEW}\"/" postgresql18/config.yaml
          # Keep Dockerfile ARG default in sync for local development convenience.
          # (Not required for CI builds — HA builder injects BUILD_VERSION automatically.)
          sed -i "s/^ARG BUILD_VERSION=.*/ARG BUILD_VERSION=${NEW}/" postgresql18/Dockerfile

      - name: Open Pull Request
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "update/postgresql18-${{ steps.latest.outputs.version }}"
          commit-message: "Update postgresql18 to v${{ steps.latest.outputs.version }}"
          title: "Update postgresql18 to v${{ steps.latest.outputs.version }}"
          body: |
            Automated update of the PostgreSQL 18 base image.

            - Previous version: `${{ steps.current.outputs.version }}`
            - New version: `${{ steps.latest.outputs.version }}`

            [Docker Hub tags](https://hub.docker.com/_/postgres/tags?name=18.)
          labels: "dependencies,automated"
