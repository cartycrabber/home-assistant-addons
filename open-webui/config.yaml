# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: Open WebUI
version: "0.9.5"
slug: open-webui
description: >-
  A feature-rich, self-hosted AI platform supporting Ollama and OpenAI-compatible APIs.
url: "https://openwebui.com"
arch:
  - aarch64
  - amd64
init: false

# Store persistent data in /data
map:
  - type: data
    read_only: False
    path: /app/backend/data

# Expose port for direct access
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Open WebUI web interface"

timeout: 60

options:
  env_vars: []

schema:
  env_vars:
    - name: str
      value: str

image: "ghcr.io/cartycrabber/app-open-webui"
